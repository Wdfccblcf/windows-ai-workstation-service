{
  "name": "缺陷报告",
  "description": "提交可复现、已脱敏并带验收边界的缺陷",
  "title": "[bug] ",
  "body": [
    {
      "type": "markdown",
      "attributes": {
        "value": "先删除或替换日志、截图中的 API Key、token、客户数据、用户名、完整用户路径和设备标识。安全漏洞请勿公开。"
      }
    },
    {
      "type": "textarea",
      "id": "reproduction",
      "attributes": {
        "label": "复现步骤",
        "description": "从干净状态开始给出最小、稳定的复现步骤。"
      },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "expected",
      "attributes": { "label": "期望行为", "description": "说明正确结果和可判定条件。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "actual",
      "attributes": { "label": "实际行为", "description": "说明实际结果、退出码和失败位置。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "environment",
      "attributes": { "label": "环境与版本", "description": "记录 OS、PowerShell、Node/npm、浏览器及相关版本，不要提供用户名或完整路径。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "evidence",
      "attributes": { "label": "已脱敏证据", "description": "粘贴最小日志、截图说明或链接；必须先脱敏。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "impact",
      "attributes": { "label": "影响范围", "description": "说明受影响用户、路径、频率和严重度。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "acceptance",
      "attributes": { "label": "建议验收", "description": "列出修复后应通过的复现、测试和回归 checklist。", "value": "- [ ] 原始复现不再失败。\n- [ ] 新增回归测试。\n- [ ] 相关生产契约与线上 smoke 通过。" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "rollback",
      "attributes": { "label": "风险与回滚", "description": "说明潜在副作用、回滚路径与恢复验证。" },
      "validations": { "required": true }
    },
    {
      "type": "checkboxes",
      "id": "privacy",
      "attributes": {
        "label": "隐私与安全确认",
        "options": [
          { "label": "证据已脱敏，不含真实凭据、客户数据、完整用户路径或可识别截图。", "required": true },
          { "label": "若这是安全漏洞，我会停止公开提交并使用私密报告入口。", "required": true }
        ]
      },
      "validations": { "required": true }
    }
  ]
}
